version: "3.8"

services:

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: employee_db
    ports:
      - "3307:3306"

  backend:
   build:
    context: ./aipowered   # 👈 FIX THIS
   ports:
    - "8080:8080"
   depends_on:
    - mysql

  frontend:
    build: ./frontend/ai-chat-ui
    ports:
      - "3000:3000"
    depends_on:
      - backend